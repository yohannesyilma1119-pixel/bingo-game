<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINGO HUB - Professional</title>
    <style>
        :root { 
            --primary-bg: #d1b3ff; 
            --panel-purple: #8e44ad;
            --accent-orange: #ff8c00;
            --text-dark: #2c3e50;
        }

        body { 
            background-color: var(--primary-bg); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 5px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Dashboard */
        .dashboard {
            display: grid; grid-template-columns: repeat(5, 1fr);
            width: 100%; max-width: 600px; gap: 4px; margin-bottom: 5px;
        }
        .stat-item {
            background: white; border-radius: 8px; padding: 5px 2px;
            text-align: center; border: 1px solid #dcdde1;
        }
        .stat-label { font-size: 8px; color: #8e44ad; font-weight: bold; display: block; }
        .stat-val { font-size: 12px; font-weight: bold; }

        /* --- SELECTION SCREEN (PIC 1 STYLE) --- */
        #select-screen { 
            width: 100%; max-width: 500px; 
            display: flex; flex-direction: column; height: 90vh;
        }
        
        /* ካርቴላ መምረጫው ቦታ ሰፋ እንዲል */
        .scroll-container { 
            background: rgba(255, 255, 255, 0.6); border-radius: 15px; padding: 12px; 
            flex: 1; /* የቀረውን ክፍት ቦታ እንዲይዝ */
            overflow-y: auto; border: 2px solid white; margin-bottom: 10px;
        }
        
        /* ቁጥሮቹ ሰፋ ብለው እንዲታዩ (5 በረድፍ) */
        .selection-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; 
        }
        
        .sel-btn { 
            background: #ff8c00; color: white; border: none; padding: 15px 0; 
            border-radius: 10px; font-weight: bold; font-size: 16px; 
            box-shadow: 0 4px 0 #cc6600; cursor: pointer;
        }
        .sel-btn.active { background: #119a4d !important; box-shadow: 0 4px 0 #0d7a3d !important; transform: translateY(2px); }

        /* View Area (Preview) */
        .preview-container { 
            background: white; padding: 10px; border-radius: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            min-height: 200px;
        }
        
        #preview-box { width: 100%; display: flex; justify-content: center; transform: scale(0.9); }

        /* --- GAME MODE (PIC 2) --- */
        .game-layout { display: flex; width: 100%; max-width: 650px; gap: 10px; padding: 5px; }
        .left-board {
            flex: 0.4; background: #c8a2c8; border-radius: 10px; padding: 5px; 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
        }
        .board-num { font-size: 10px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: white; border-radius: 3px; }
        .num-called { background: #ff8c00 !important; color: white; }

        .play-area { flex: 0.6; display: flex; flex-direction: column; gap: 8px; }
        .call-circle { background: #ff8c00; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 3px solid white; margin: 0 auto; }

        /* Bingo Card */
        .bingo-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        .b-header td { background: #e74c3c; color: white; text-align: center; font-weight: bold; border: 1px solid #333; }
        .card-cell { width: 20%; aspect-ratio: 1; text-align: center; font-weight: bold; border: 1px solid #333; font-size: 18px; }
        .cell-active { background: #119a4d !important; color: white !important; }

        #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="dashboard">
        <div class="stat-item"><span class="stat-label">DERASH</span><div class="stat-val">2500</div></div>
        <div class="stat-item"><span class="stat-label">PLAYERS</span><div class="stat-val">312</div></div>
        <div class="stat-item"><span class="stat-label">TIME</span><div class="stat-val" id="timer-val">25</div></div>
        <div class="stat-item"><span class="stat-label">STAKE</span><div class="stat-val">15</div></div>
        <div class="stat-item"><span class="stat-label">GAME#</span><div class="stat-val">882</div></div>
    </div>

    <div id="select-screen">
        <div class="scroll-container">
            <div class="selection-grid" id="grid"></div>
        </div>
        
        <div class="preview-container">
            <div style="background: var(--panel-purple); color: white; padding: 4px 15px; border-radius: 15px; font-size: 12px; margin-bottom: 5px;">የካርቴላ እይታ</div>
            <div id="preview-box">
                 <div style="color: #999; margin-top: 40px;">ካርቴላ ይምረጡ...</div>
            </div>
            <button id="start-btn" class="hidden" style="background:#119a4d; color:white; border:none; padding:10px 40px; border-radius:10px; font-weight:bold; margin-top:5px;" onclick="startGame()">ጨዋታውን ጀምር</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="game-layout">
            <div class="left-board" id="num-grid-container"></div>
            <div class="play-area">
                <div class="call-circle" id="ball-box">?</div>
                <div class="bingo-table-wrapper">
                    <table class="bingo-table">
                        <tr class="b-header"><td>B</td><td>I</td><td>N</td><td>G</td><td>O</td></tr>
                        <tbody id="game-card-body"></tbody>
                    </table>
                </div>
                <button style="background:#ff8c00; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:20px; box-shadow: 0 4px 0 #cc6600;" onclick="checkBingo()">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <h1 style="font-size: 50px; color: #f1c40f; margin: 0;">BINGO!</h1>
        <div id="winner-display" style="transform: scale(0.7);"></div>
        <p id="winner-info" style="font-size: 20px;"></p>
        <button onclick="location.reload()" style="padding: 10px 30px; background: #ff8c00; color: white; border: none; border-radius: 8px;">ቀጣይ ጨዋታ</button>
    </div>

    <script>
        let selectedID = null;
        let timeLeft = 25;
        let gameStarted = false;
        let calledNums = [];

        // 1. Grid መፍጠር (ሰፋ ያሉ በተኖች)
        const grid = document.getElementById('grid');
        for(let i=1; i<=200; i++) {
            let b = document.createElement('button');
            b.className = 'sel-btn';
            b.innerText = i;
            b.onclick = () => {
                if(selectedID) {
                    let prev = document.querySelector('.sel-btn.active');
                    if(prev) prev.classList.remove('active');
                }
                selectedID = i;
                b.classList.add('active');
                document.getElementById('preview-box').innerHTML = genCardHTML(i, false);
                document.getElementById('start-btn').classList.remove('hidden');
            };
            grid.appendChild(b);
        }

        // 2. ቢንጎ ቦርድ (1-75)
        const board = document.getElementById('num-grid-container');
        for(let i=1; i<=75; i++) {
            let d = document.createElement('div');
            d.className = 'board-num';
            d.id = 'slot-' + i;
            d.innerText = i;
            board.appendChild(d);
        }

        // 3. Timer 
        const timerInt = setInterval(() => {
            if(!gameStarted && timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
            } else if (timeLeft <= 0 && !gameStarted) {
                startGame();
            }
        }, 1000);

        function startGame() {
            gameStarted = true;
            if(!selectedID) selectedID = Math.floor(Math.random()*200)+1;
            document.getElementById('select-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-card-body').innerHTML = genCardHTML(selectedID, true);
            
            // ቁጥር ማውጣት መጀመር
            setInterval(() => {
                if(calledNums.length < 75) {
                    let ball;
                    do { ball = Math.floor(Math.random()*75)+1; } while(calledNums.includes(ball));
                    calledNums.append(ball); // Logic error fix: use .push
                    calledNums.push(ball); 
                    document.getElementById('ball-box').innerText = ball;
                    document.getElementById('slot-'+ball).classList.add('num-called');
                }
            }, 4000);
        }

        function genCardHTML(id, play) {
            const seed = id * 55;
            const getN = (s, min, max) => {
                let r = []; while(r.length<5) { s=(s*9301+49297)%233280; let v=Math.floor((s/233280)*(max-min+1))+min; if(!r.includes(v)) r.push(v); }
                return r.sort((a,b)=>a-b);
            };
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let h = '';
            for(let i=0; i<5; i++) {
                h += '<tr>';
                for(let j=0; j<5; j++) {
                    let v = cols[j][i];
                    let isF = (i==2 && j==2);
                    h += `<td class="card-cell ${isF?'cell-active':''}" onclick="${play?'this.classList.toggle(\'cell-active\')':''}">${isF?'FREE':v}</td>`;
                }
                h += '</tr>';
            }
            return h;
        }

        function checkBingo() {
            // በሙከራ ደረጃ አሸናፊ ለማሳየት
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('winner-display').innerHTML = '<table class="bingo-table">' + genCardHTML(selectedID, false) + '</table>';
            document.getElementById('winner-info').innerText = "አሸናፊ፡ ጆዬ | ካርቴላ #" + selectedID;
        }
        
        function initAudio() {}
    </script>
</body>
</html>
