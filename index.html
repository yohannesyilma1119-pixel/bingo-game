<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Hub - Final Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f021a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Header Section (ልክ በምስሉ ላይ እንዳለው) */
        .header-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; padding-top: 10px; }
        .info-box { border: 2px solid #0088cc; border-radius: 8px; padding: 5px 10px; min-width: 70px; background: #1a1a1a; font-size: 12px; }
        .info-box span { color: #0088cc; display: block; font-weight: bold; }

        /* Number Buttons Grid */
        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            max-width: 100%; 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 30px;
        }
        .num-btn { 
            background: #e67e22; 
            color: white; 
            border: none; 
            padding: 12px 0; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer;
        }
        .num-btn:active { background: #d35400; transform: scale(0.9); }

        /* Timer & Game Screens */
        .hidden { display: none; }
        .timer { font-size: 60px; color: #f1c40f; margin: 30px 0; font-weight: bold; }
        
        /* Bingo Card Styling */
        .bingo-card { background: #27ae60; color: white; border: 4px solid #fff; border-radius: 12px; width: 320px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { border-collapse: collapse; width: 100%; }
        th { background: #1e8449; padding: 10px; font-size: 22px; border-bottom: 2px solid #fff; }
        td { border: 1px solid #fff; width: 55px; height: 55px; text-align: center; font-size: 22px; font-weight: bold; cursor: pointer; }
        .marked { background: #f1c40f !important; color: black; position: relative; }
        .marked::after { content: '✔'; color: red; position: absolute; top: 2px; left: 10px; font-size: 35px; }
        .free-space { background: #f39c12; font-size: 10px; color: black; }

        /* Winner Message */
        #winner-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 3px solid #f1c40f; padding: 40px;
            border-radius: 20px; z-index: 100; display: none; width: 80%;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="color: #f1c40f; margin: 10px 0;">BINGO HUB</h1>
        
        <div class="header-bar">
            <div class="info-box">Game <span>240226</span></div>
            <div class="info-box">Bet <span>10 ETB</span></div>
            <div class="info-box">Active Game <span>1</span></div>
            <div class="info-box">Wallet <span>0.30 ETB</span></div>
        </div>

        <div class="selection-grid" id="grid-container">
            </div>
    </div>

    <div id="waiting" class="hidden">
        <h2 style="color: #f1c40f; margin-top: 50px;">ጨዋታው ሊጀመር ነው...</h2>
        <div class="timer" id="countdown">30</div>
        <p>ካርቴላዎ በመዘጋጀት ላይ ነው</p>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="card-id-label" style="color: #f1c40f;">ካርቴላ #</h2>
        <div id="bingo-card-box" class="bingo-card"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; background:#e67e22; color:white; border:none; border-radius:8px; font-weight:bold;">ተመለስ</button>
    </div>

    <div id="winner-popup">
        <h1 style="color: #f1c40f; font-size: 45px; margin: 0;">BINGO!</h1>
        <p style="font-size: 20px;">እንኳን ደስ አለህ አሸንፈሃል!</p>
        <button onclick="location.reload()" style="padding: 10px 20px; background: #f1c40f; border: none; font-weight: bold; border-radius: 5px;">ቀጥል</button>
    </div>

    <script>
        // 1. ቁጥሮቹን (1-130) መፍጠር
        const container = document.getElementById('grid-container');
        for (let i = 1; i <= 130; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => startBingo(i);
            container.appendChild(btn);
        }

        // 2. ቆጣሪውን ማስጀመር
        function startBingo(id) {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('waiting').classList.remove('hidden');
            
            let time = 30;
            const timerInterval = setInterval(() => {
                time--;
                document.getElementById('countdown').innerText = time;
                if(time <= 0) {
                    clearInterval(timerInterval);
                    generateCard(id);
                }
            }, 1000);
        }

        // 3. ቋሚ ካርቴላ ማመንጨት
        function generateCard(id) {
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('card-id-label').innerText = "ካርቴላ #" + id;

            const seed = parseInt(id);
            const B = getNums(seed, 1, 15);
            const I = getNums(seed + 10, 16, 30);
            const N = getNums(seed + 20, 31, 45);
            const G = getNums(seed + 30, 46, 60);
            const O = getNums(seed + 40, 61, 75);

            let html = `<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            for (let i = 0; i < 5; i++) {
                html += '<tr>';
                html += `<td onclick="mark(this)">${B[i]}</td>`;
                html += `<td onclick="mark(this)">${I[i]}</td>`;
                if(i === 2) html += `<td class="free-space marked">FREE</td>`;
                else html += `<td onclick="mark(this)">${N[i]}</td>`;
                html += `<td onclick="mark(this)">${G[i]}</td>`;
                html += `<td onclick="mark(this)">${O[i]}</td></tr>`;
            }
            document.getElementById('bingo-card-box').innerHTML = html + '</table>';
        }

        function getNums(seed, min, max) {
            let res = [];
            let s = seed;
            while(res.length < 5) {
                s = (s * 9301 + 49297) % 233280;
                let val = Math.floor((s / 233280) * (max - min + 1)) + min;
                if(!res.includes(val)) res.push(val);
            }
            return res.sort((a,b) => a-b);
        }

        function mark(el) {
            el.classList.toggle('marked');
            checkWinner();
        }

        function checkWinner() {
            const cells = document.querySelectorAll('td');
            const m = Array.from(cells).map(c => c.classList.contains('marked'));
            let win = false;
            for(let i=0; i<5; i++) {
                if(m[i*5] && m[i*5+1] && m[i*5+2] && m[i*5+3] && m[i*5+4]) win = true; // Row
                if(m[i] && m[i+5] && m[i+10] && m[i+15] && m[i+20]) win = true; // Col
            }
            if(win) {
                document.getElementById('winner-popup').style.display = 'block';
                const speech = new SpeechSynthesisUtterance("BINGO! You are the winner!");
                window.speechSynthesis.speak(speech);
            }
        }
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
