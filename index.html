<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Hub - Tab Edition</title>
    <style>
        body { background-color: #d1b3ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        .hub-logo { color: #800080; font-weight: bold; font-size: 24px; text-shadow: 1px 1px white; margin: 5px 0; }
        
        /* Stats */
        .top-stats { display: flex; justify-content: space-between; width: 100%; max-width: 440px; gap: 4px; margin-bottom: 8px; }
        .stat-box { background: white; border: 1px solid #b380ff; border-radius: 6px; flex: 1; padding: 6px 2px; text-align: center; }
        .stat-val { font-size: 13px; font-weight: bold; color: #333; }

        /* Tabs for 1-100 and 101-200 */
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 400px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #800080; color: white; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #ff8000; box-shadow: 0 3px 0 #cc6600; }

        /* Selection Screen */
        #select-screen { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: white; padding: 10px; border-radius: 12px; width: 100%; height: 180px; overflow-y: auto; border: 1px solid #b380ff; }
        .sel-btn { background: #ff8000; color: white; border: none; padding: 10px 0; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .preview-area { margin-top: 10px; text-align: center; width: 100%; }
        .bingo-card { background: white; border-radius: 8px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; zoom: 0.85; }
        td { width: 40px; height: 38px; border: 1px solid #eee; text-align: center; font-weight: bold; font-size: 18px; }
        .cell-marked { background: #27ae60 !important; color: white !important; }

        /* Game Layout */
        .main-game-area { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 500px; }
        .left-board { background: #e6ccff; border-radius: 8px; padding: 5px; }
        .b-cols { display: flex; gap: 2px; }
        .bn { width: 30px; height: 21px; background: #f0e6ff; border: 1px solid #d1b3ff; border-radius: 3px; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #bbb; }
        .bn-active { background: #27ae60 !important; color: white !important; }
        
        .right-content { display: flex; flex-direction: column; gap: 5px; align-items: center; flex: 1; }
        .bingo-btn { background: #ff8000; border: none; width: 100%; padding: 15px; color: white; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="hub-logo">BINGO HUB</div>

    <div id="select-stats" class="top-stats">
        <div class="stat-box"><div class="stat-val" id="wallet-val">100.00</div></div>
        <div class="stat-box"><div class="stat-val" id="timer-val">25</div></div>
        <div class="stat-box"><div class="stat-val" id="pre-d-val">0</div></div>
    </div>

    <div id="game-stats" class="top-stats hidden">
        <div class="stat-box"><div class="stat-val" id="g-derash">0</div></div>
        <div class="stat-box"><div class="stat-val" id="c-count">0</div></div>
        <div class="stat-box"><div class="stat-val" id="g-card">0</div></div>
    </div>

    <div id="select-screen">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(1)">1-100</button>
            <button class="tab-btn" onclick="showTab(2)">101-200</button>
        </div>
        <div class="selection-grid" id="grid"></div>
        
        <div class="preview-area">
            <div style="font-weight:bold; color:#800080; margin-bottom:5px;" id="prev-tag">ካርቴላ ይምረጡ</div>
            <div id="preview-box" class="bingo-card"></div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="main-game-area">
            <div class="left-board" id="board-nums"></div>
            <div class="right-content">
                <div id="current-ball" style="font-size:24px; font-weight:bold; color:#800080; background:white; padding:5px 15px; border-radius:20px; border:2px solid #800080;">-</div>
                <div id="card-box" class="bingo-card"></div>
                <button class="bingo-btn" onclick="checkBingoManual()">BINGO!</button>
            </div>
        </div>
    </div>

    <script>
        let wallet = 100.00; let players = 0; let derash = 0; let selectedID = null; 
        let called = []; let callCount = 0; let timeLeft = 25; let gameStarted = false;
        let audioEnabled = false;

        function enableAudio() { audioEnabled = true; }

        // Tabs Logic
        function showTab(tabNum) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const start = tabNum === 1 ? 1 : 101;
            const end = tabNum === 1 ? 100 : 200;
            
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === tabNum);
            });

            for(let i=start; i<=end; i++) {
                let b = document.createElement('button'); b.className = 'sel-btn'; b.innerText = i;
                if(selectedID === i) b.style.background = "#27ae60";
                b.onclick = () => {
                    selectedID = i;
                    showTab(tabNum); // Refresh UI to show green
                    document.getElementById('prev-tag').innerText = "የተመረጠው ካርቴላ #" + i;
                    document.getElementById('preview-box').innerHTML = generateCardHTML(i, false);
                };
                grid.appendChild(b);
            }
        }

        // Initialize Board
        const boardNums = document.getElementById('board-nums');
        const bCols = document.createElement('div'); bCols.className = 'b-cols';
        ['B','I','N','G','O'].forEach((L, idx) => {
            let col = document.createElement('div'); col.style.display='flex'; col.style.flexDirection='column'; col.style.gap='2px';
            for(let i=1; i<=15; i++) {
                let n = (idx * 15) + i;
                let div = document.createElement('div'); div.className = 'bn'; div.id = 'n-'+n; div.innerText = n;
                col.appendChild(div);
            }
            bCols.appendChild(col);
        });
        boardNums.appendChild(bCols);

        function generateCardHTML(id, interactive) {
            const seed = id * 55;
            const getN = (s, min, max) => {
                let r = []; while(r.length<5) { s=(s*9301+49297)%233280; let v=Math.floor((s/233280)*(max-min+1))+min; if(!r.includes(v)) r.push(v); }
                return r.sort((a,b)=>a-b);
            };
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let h = `<table>`;
            for(let i=0; i<5; i++) {
                h += '<tr>';
                for(let j=0; j<5; j++) {
                    let v = cols[j][i];
                    if(i==2 && j==2) h += `<td class="cell-marked">★</td>`;
                    else h += `<td ${interactive ? `onclick="mark(this, ${v})"` : ''}>${v}</td>`;
                }
                h += '</tr>';
            }
            return h + '</table>';
        }

        function mark(el, v) { if(called.includes(v)) el.classList.toggle('cell-marked'); }

        const timerInt = setInterval(() => {
            if(!gameStarted) {
                timeLeft--;
                document.getElementById('timer-val').innerText = "Time: " + timeLeft;
                players += 2; derash = players * 8;
                document.getElementById('pre-d-val').innerText = "Derash: " + derash;
                if(timeLeft <= 0) { clearInterval(timerInt); startGame(); }
            }
        }, 1000);

        function startGame() {
            gameStarted = true;
            if(!selectedID) selectedID = 1;
            wallet -= 10;
            document.getElementById('select-screen').classList.add('hidden');
            document.getElementById('select-stats').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('g-derash').innerText = "Derash: " + derash;
            document.getElementById('g-card').innerText = "Card: #" + selectedID;
            document.getElementById('card-box').innerHTML = generateCardHTML(selectedID, true);
            
            setInterval(() => {
                let ball; do { ball = Math.floor(Math.random()*75)+1; } while(called.includes(ball));
                called.push(ball); callCount++;
                document.getElementById('c-count').innerText = "Call: " + callCount;
                let letter = ['B','I','N','G','O'][Math.floor((ball-1)/15)];
                document.getElementById('current-ball').innerText = letter + "-" + ball;
                document.getElementById('n-'+ball).classList.add('bn-active');
                if(audioEnabled) {
                    let msg = new SpeechSynthesisUtterance(`${letter} ${ball}`);
                    msg.lang = 'am-ET'; window.speechSynthesis.speak(msg);
                }
            }, 4000);
        }

        showTab(1); // Start with first tab
    </script>
</body>
</html>
