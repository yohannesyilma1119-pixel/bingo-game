<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Hub - Auto Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f021a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Header Info - ታይምሩ ከባላንሱ ጎን ተቀምጧል */
        .header-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .info-box { border: 1px solid #0088cc; border-radius: 8px; padding: 5px; background: #1a1a1a; min-width: 75px; flex: 1; max-width: 100px; }
        .info-box div { font-size: 9px; color: #ccc; text-transform: uppercase; }
        .info-box span { color: #0088cc; font-weight: bold; font-size: 13px; }
        .timer-box { border: 1px solid #f1c40f !important; }
        .timer-box span { color: #f1c40f !important; }

        /* Current Ball Display */
        .caller-area { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 10px auto; max-width: 320px; border: 2px solid #27ae60; }
        .current-ball { font-size: 45px; font-weight: bold; color: #f1c40f; }
        .called-history { font-size: 12px; color: #aaa; margin-top: 5px; height: 20px; overflow: hidden; }

        /* Bingo Card */
        .bingo-card { background: #27ae60; border: 4px solid #fff; border-radius: 12px; width: 320px; margin: 0 auto; }
        table { border-collapse: collapse; width: 100%; }
        td { border: 1px solid #fff; width: 55px; height: 55px; text-align: center; font-size: 22px; font-weight: bold; cursor: pointer; position: relative; }
        .marked { background: #f1c40f !important; color: black; }
        .marked::after { content: '✔'; color: red; position: absolute; font-size: 30px; left: 15px; top: 5px; }
        .free-space { background: #f39c12; font-size: 10px; color: black; }

        /* Selection Grid */
        .selection-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 450px; margin: 0 auto; background: #1a1a1a; padding: 10px; border-radius: 12px; }
        .num-btn { background: #e67e22; color: white; border: none; padding: 10px 0; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .selected-btn { background: #27ae60 !important; border: 1px solid white; }

        .hidden { display: none; }
        #winner-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="info-box"><div>Bet</div><span>10 ETB</span></div>
        <div class="info-box"><div>Wallet</div><span>50.00 ETB</span></div>
        <div class="info-box timer-box"><div>Time</div><span id="header-timer">30</span></div>
        <div class="info-box"><div>Players</div><span id="player-count">48</span></div>
    </div>

    <div id="selection-screen">
        <h3 style="color: #f1c40f;">ካርቴላ ይምረጡ (1-100)</h3>
        <div class="selection-grid" id="grid"></div>
    </div>

    <div id="game-mode" class="hidden">
        <div class="caller-area">
            <div>የወጣ ቁጥር</div>
            <div class="current-ball" id="ball">-</div>
            <div class="called-history" id="history">ባዶ</div>
        </div>
        <div id="card-display" class="bingo-card"></div>
    </div>

    <div id="winner-screen">
        <h1 style="color: #f1c40f; font-size: 60px; margin: 0;">BINGO!</h1>
        <p style="font-size: 24px;">እንኳን ደስ አለህ አሸንፈሃል!</p>
        <button onclick="location.reload()" style="padding: 15px 30px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px;">ቀጥል</button>
    </div>

    <script>
        let timeLeft = 30;
        let selectedID = null;
        let calledNumbers = [];
        let gameStarted = false;

        // 1. ታይምር ማስጀመር
        const hTimer = document.getElementById('header-timer');
        const tInterval = setInterval(() => {
            timeLeft--;
            hTimer.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(tInterval);
                startBingoGame();
            }
        }, 1000);

        // 2. ቁጥሮችን መፍጠር
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 100; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => {
                selectedID = i;
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected-btn'));
                btn.classList.add('selected-btn');
            };
            grid.appendChild(btn);
        }

        // 3. ጨዋታውን ማስጀመር
        function startBingoGame() {
            if(!selectedID) selectedID = Math.floor(Math.random() * 100) + 1;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-mode').classList.remove('hidden');
            generateCard(selectedID);
            gameStarted = true;
            runCaller();
        }

        function runCaller() {
            const callerInterval = setInterval(() => {
                if(calledNumbers.length >= 75) { clearInterval(callerInterval); return; }
                
                let ball;
                do { ball = Math.floor(Math.random() * 75) + 1; } while(calledNumbers.includes(ball));
                
                calledNumbers.push(ball);
                document.getElementById('ball').innerText = ball;
                document.getElementById('history').innerText = "ያለፉት፡ " + calledNumbers.slice(-5).join(", ");
                
                // ድምፅ
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(ball));
            }, 4000); // በየ 4 ሰከንዱ ቁጥር ይጠራል
        }

        function generateCard(id) {
            const seed = id * 55;
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let html = `<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            for(let i=0; i<5; i++) {
                html += '<tr>';
                for(let j=0; j<5; j++) {
                    if(i==2 && j==2) html += `<td class="free-space marked">FREE</td>`;
                    else html += `<td onclick="mark(this, ${cols[j][i]})">${cols[j][i]}</td>`;
                }
                html += '</tr>';
            }
            document.getElementById('card-display').innerHTML = html + '</table>';
        }

        function getN(s, min, max) {
            let r = [];
            while(r.length < 5) {
                s = (s * 9301 + 49297) % 233280;
                let v = Math.floor((s/233280)*(max-min+1))+min;
                if(!r.includes(v)) r.push(v);
            }
            return r.sort((a,b)=>a-b);
        }

        function mark(el, val) {
            if(!calledNumbers.includes(val)) return; // የወጣ ቁጥር ካልሆነ አይነካም
            el.classList.add('marked');
            checkWinner();
        }

        function checkWinner() {
            const m = Array.from(document.querySelectorAll('td')).map(td => td.classList.contains('marked'));
            let w = false;
            for(let i=0; i<5; i++) {
                if(m[i*5]&&m[i*5+1]&&m[i*5+2]&&m[i*5+3]&&m[i*5+4]) w = true; // Row
                if(m[i]&&m[i+5]&&m[i+10]&&m[i+15]&&m[i+20]) w = true; // Col
            }
            if((m[0]&&m[6]&&m[12]&&m[18]&&m[24]) || (m[4]&&m[8]&&m[12]&&m[16]&&m[20])) w = true; // Diag
            if(m[0]&&m[4]&&m[20]&&m[24]) w = true; // 4 Corners
            
            if(w) {
                document.getElementById('winner-screen').style.display = 'flex';
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bingo! You Won!"));
            }
        }

        // የሰው ብዛት ራንደም ማድረግ
        document.getElementById('player-count').innerText = Math.floor(Math.random() * 50) + 20;
    </script>
</body>
</html>
