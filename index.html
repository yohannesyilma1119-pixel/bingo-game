<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Hub - Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 15px; margin: 0; }
        .lobby-screen { background: #2c3e50; padding: 25px; border-radius: 15px; border: 2px solid #f1c40f; max-width: 320px; margin: 30px auto; }
        input { width: 90px; padding: 12px; font-size: 22px; text-align: center; border-radius: 8px; border: none; margin: 15px; background: #ecf0f1; font-weight: bold; }
        .timer { font-size: 45px; color: #f1c40f; font-weight: bold; margin: 20px; }
        
        .bingo-card { 
            background: #27ae60; border: 3px solid #fff; border-radius: 12px; 
            padding: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); width: 100%; max-width: 340px; margin: 0 auto;
        }
        table { border-collapse: collapse; width: 100%; background: rgba(0,0,0,0.1); }
        th, td { border: 1px solid #fff; width: 55px; height: 55px; text-align: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        th { background-color: #1e8449; color: white; }
        
        .marked { background-color: #f1c40f !important; color: #1a1a1a; transform: scale(0.92); transition: 0.2s; }
        .free-space { background-color: #f39c12; font-size: 0.7rem; color: #000; }
        
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; min-height: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="color: #f1c40f;">BINGO HUB</h1>
        <div class="lobby-screen">
            <p>የካርቴላ ቁጥርዎን ያስገቡ (1 - 100)</p>
            <input type="number" id="cardID" min="1" max="100" placeholder="40">
            <br>
            <button class="btn" onclick="waitAndStart()">ካርቴላውን አግብታ</button>
        </div>
    </div>

    <div id="waiting" class="hidden">
        <h2 style="margin-top: 50px;">ጨዋታው ሊጀመር ነው...</h2>
        <div class="timer" id="countdown">30</div>
    </div>

    <div id="game-area" class="hidden">
        <h3 id="card-header" style="color: #f1c40f;">ካርቴላ #40</h3>
        <div id="card-container"></div>
        <div id="status" style="color: #2ecc71;">ቁጥሮችን ይጠብቁ...</div>
    </div>

    <script>
        function getNumbers(seed, min, max, count) {
            let nums = [];
            let s = seed;
            while(nums.length < count) {
                s = (s * 9301 + 49297) % 233280;
                let rnd = s / 233280;
                let r = Math.floor(rnd * (max - min + 1)) + min;
                if(!nums.includes(r)) nums.push(r);
            }
            return nums.sort((a, b) => a - b);
        }

        function waitAndStart() {
            const id = document.getElementById('cardID').value;
            if(!id || id < 1 || id > 100) { alert("1-100 ያስገቡ!"); return; }
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('waiting').classList.remove('hidden');
            let timeLeft = 30;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timer); launchBingo(id); }
            }, 1000);
        }

        function launchBingo(id) {
            document.getElementById('waiting').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('card-header').innerText = "ካርቴላ #" + id;

            const seed = parseInt(id);
            const cols = [
                getNumbers(seed, 1, 15, 5),
                getNumbers(seed + 100, 16, 30, 5),
                getNumbers(seed + 200, 31, 45, 5),
                getNumbers(seed + 300, 46, 60, 5),
                getNumbers(seed + 400, 61, 75, 5)
            ];

            let html = `<div class="bingo-card"><table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            for (let i = 0; i < 5; i++) {
                html += '<tr>';
                for (let j = 0; j < 5; j++) {
                    if (i === 2 && j === 2) html += `<td class="free-space" id="cell-12">FREE</td>`;
                    else html += `<td onclick="mark(this)" id="cell-${i*5+j}">${cols[j][i]}</td>`;
                }
                html += '</tr>';
            }
            document.getElementById('card-container').innerHTML = html + `</table></div>`;
        }

        function mark(el) {
            el.classList.toggle('marked');
            checkWinner();
        }

        function checkWinner() {
            const cells = document.querySelectorAll('td');
            const m = Array.from(cells).map(c => c.classList.contains('marked') || c.classList.contains('free-space'));
            let won = false;

            for (let i = 0; i < 5; i++) {
                if (m[i*5] && m[i*5+1] && m[i*5+2] && m[i*5+3] && m[i*5+4]) won = true; // Horizontal
                if (m[i] && m[i+5] && m[i+10] && m[i+15] && m[i+20]) won = true; // Vertical
            }
            if (m[0] && m[6] && m[12] && m[18] && m[24]) won = true; // Diagonal 1
            if (m[4] && m[8] && m[12] && m[16] && m[20]) won = true; // Diagonal 2
            if (m[0] && m[4] && m[20] && m[24]) won = true; // 4 Corners

            if (won) {
                document.getElementById('status').innerText = "🎉 BINGO! አሸንፈሃል!";
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
