<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Hub - Live Preview & Taken Cards</title>
    <style>
        body { background-color: #d1b3ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        .hub-logo { color: #800080; font-weight: bold; font-size: 24px; text-shadow: 1px 1px white; margin: 5px 0; }
        
        /* Stats Bar */
        .top-stats { display: flex; justify-content: space-between; width: 100%; max-width: 480px; gap: 4px; margin-bottom: 10px; }
        .stat-box { background: white; border-radius: 8px; flex: 1; padding: 8px 2px; text-align: center; border: 1px solid #b380ff; }
        .stat-label { font-size: 10px; color: #8000ff; font-weight: bold; display: block; }
        .stat-val { font-size: 16px; font-weight: bold; color: #333; }

        /* Selection Grid */
        #select-screen { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
        .scroll-container { 
            background: white; border-radius: 15px; padding: 10px; border: 2px solid #b380ff; 
            width: 96%; height: 400px; overflow-y: scroll; margin-bottom: 10px;
        }
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        
        /* Button Styles */
        .sel-btn { 
            background: #ff8000; color: white; border: none; padding: 12px 0; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 3px 0 #cc6600;
        }
        .sel-btn.active { background: #27ae60 !important; box-shadow: 0 3px 0 #1e8449 !important; }
        
        /* Taken (Greyed out) */
        .sel-btn.taken { 
            background: #d1d1d1 !important; color: #888 !important; 
            box-shadow: none !important; cursor: not-allowed !important; opacity: 0.7;
        }

        /* Preview Area */
        .preview-area { text-align: center; width: 100%; margin-top: 5px; }
        .card-tag { background: white; padding: 5px 20px; border-radius: 20px; color: #800080; font-weight: bold; margin-bottom: 8px; display: inline-block; border: 1px solid #b380ff; }
        
        .bingo-card { background: white; border-radius: 12px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; }
        table { border-collapse: collapse; }
        td { width: 42px; height: 40px; border: 1px solid #eee; text-align: center; font-weight: bold; font-size: 18px; color: #444; }
        .cell-marked { background: #27ae60 !important; color: white !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="hub-logo">BINGO HUB</div>

    <div id="select-stats" class="top-stats">
        <div class="stat-box"><span class="stat-label">WALLET</span><div class="stat-val">100.00</div></div>
        <div class="stat-box"><span class="stat-label">TIMER</span><div class="stat-val" id="timer-val">25</div></div>
        <div class="stat-box"><span class="stat-label">DERASH</span><div class="stat-val" id="pre-d-val">0</div></div>
    </div>

    <div id="select-screen">
        <div class="scroll-container">
            <div class="selection-grid" id="grid"></div>
        </div>
        
        <div class="preview-area">
            <div class="card-tag" id="prev-tag">ካርቴላ ይምረጡ</div>
            <div id="preview-box" class="bingo-card" style="zoom: 0.85;"></div>
        </div>
    </div>

    <script>
        let selectedID = null;
        let timeLeft = 25;
        let gameStarted = false;

        // Grid for 200 Cards
        const grid = document.getElementById('grid');
        for(let i=1; i<=200; i++) {
            let b = document.createElement('button');
            b.className = 'sel-btn';
            b.innerText = i;
            b.id = 'sel-'+i;
            
            // "Taken" logic: Randomly mark some cards as taken (e.g., numbers divisible by 6 or 11)
            if(i % 6 === 0 || i % 11 === 0) {
                b.classList.add('taken');
                b.title = "ይህ ካርቴላ ተይዟል";
            } else {
                b.onclick = () => {
                    if(!gameStarted) {
                        if(selectedID) document.getElementById('sel-'+selectedID).classList.remove('active');
                        selectedID = i; 
                        b.classList.add('active');
                        document.getElementById('prev-tag').innerText = "ካርቴላ #" + i;
                        document.getElementById('preview-box').innerHTML = generateCardHTML(i);
                    }
                };
            }
            grid.appendChild(b);
        }

        // Timer and Stats
        const tInt = setInterval(() => {
            if(!gameStarted) {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                document.getElementById('pre-d-val').innerText = (25 - timeLeft) * 15;
                if(timeLeft <= 0) { clearInterval(tInt); }
            }
        }, 1000);

        function generateCardHTML(id) {
            const seed = id * 55;
            const getN = (s, min, max) => {
                let r = []; while(r.length<5) { s=(s*9301+49297)%233280; let v=Math.floor((s/233280)*(max-min+1))+min; if(!r.includes(v)) r.push(v); }
                return r.sort((a,b)=>a-b);
            };
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let h = `<table>`;
            for(let i=0; i<5; i++) {
                h += '<tr>';
                for(let j=0; j<5; j++) {
                    let v = cols[j][i];
                    if(i==2 && j==2) h += `<td class="cell-marked">★</td>`;
                    else h += `<td>${v}</td>`;
                }
                h += '</tr>';
            }
            return h + '</table>';
        }
        function enableAudio() { /* Audio trigger */ }
    </script>
</body>
</html>
