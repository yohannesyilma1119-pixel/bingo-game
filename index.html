<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - ደራሽ System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f021a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 5px; }
        
        /* Header Info */
        .header-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .info-box { border: 1px solid #0088cc; border-radius: 8px; padding: 5px; background: #1a1a1a; flex: 1; max-width: 95px; }
        .info-box div { font-size: 8px; color: #ccc; text-transform: uppercase; }
        .info-box span { color: #0088cc; font-weight: bold; font-size: 13px; }

        /* Game Layout */
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        /* Bingo Card */
        .bingo-card { background: #27ae60; border: 3px solid #fff; border-radius: 10px; width: 310px; margin: 0 auto; }
        table { border-collapse: collapse; width: 100%; }
        td { border: 1px solid #fff; width: 52px; height: 52px; text-align: center; font-size: 20px; font-weight: bold; cursor: pointer; position: relative; }
        .marked { background: #f1c40f !important; color: black; }
        .marked::after { content: '✔'; color: red; position: absolute; font-size: 28px; left: 14px; top: 6px; }

        /* Board (1-75) */
        .numbers-board { display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px; background: #1a1a1a; padding: 5px; border-radius: 8px; width: 310px; margin: 10px auto; }
        .board-num { font-size: 10px; padding: 5px 0; border: 1px solid #333; color: #444; border-radius: 2px; }
        .board-called { background: #f1c40f !important; color: black !important; font-weight: bold; border-color: #fff; }

        /* Selection Grid */
        .selection-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 400px; margin: 0 auto; background: #1a1a1a; padding: 10px; border-radius: 12px; }
        .num-btn { background: #e67e22; color: white; border: none; padding: 12px 0; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .selected-btn { background: #27ae60 !important; border: 2px solid white; }

        .hidden { display: none; }
        #winner-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="info-box"><div>መወራረጃ</div><span>10 ETB</span></div>
        <div class="info-box"><div id="wallet-label">Wallet</div><span id="wallet-amount">50.00</span></div>
        <div class="info-box" style="border-color:#f1c40f"><div>ጊዜ</div><span id="timer" style="color:#f1c40f">30</span></div>
        <div class="info-box"><div>ተጫዋች</div><span id="player-count">0</span></div>
    </div>

    <div id="selection-screen">
        <h3 style="color:#f1c40f; font-size:16px; margin: 5px;">ካርቴላ ይምረጡ (10 ብር)</h3>
        <div class="selection-grid" id="grid"></div>
    </div>

    <div id="game-mode" class="hidden">
        <div style="background:#1a1a1a; padding:10px; border-radius:10px; margin-bottom:10px; border:2px solid #f1c40f; width: 310px; margin-left: auto; margin-right: auto;">
            <div style="font-size:12px; color:#ccc;">የወጣ ቁጥር</div>
            <div id="current-ball" style="font-size:45px; font-weight:bold; color:#f1c40f;">-</div>
        </div>
        
        <div class="main-container">
            <div id="card-display" class="bingo-card"></div>
            <div>
                <div style="font-size:12px; margin:10px 0 5px 0; color:#27ae60; font-weight:bold;">የወጡ ቁጥሮች ማረጋገጫ (1-75)</div>
                <div class="numbers-board" id="board"></div>
            </div>
        </div>
    </div>

    <div id="winner-screen">
        <h1 style="color:#f1c40f; font-size:60px; margin: 0; text-shadow: 0 0 20px #f1c40f;">BINGO!</h1>
        <h2 id="win-amount" style="color:#fff; font-size: 30px;">+160 ETB</h2>
        <p style="color: #27ae60; font-weight: bold;">እንኳን ደስ አለህ አሸንፈሃል!</p>
        <button onclick="location.reload()" style="padding: 15px 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; margin-top: 30px; cursor: pointer;">ቀጥል</button>
    </div>

    <script>
        let wallet = 50.00;
        let derash = 0;
        let timeLeft = 30;
        let selectedID = null;
        let calledNumbers = [];
        let players = Math.floor(Math.random() * 20) + 15; // የሰው ብዛት

        // 1. ቦርዱን (1-75) መፍጠር
        const board = document.getElementById('board');
        for (let i = 1; i <= 75; i++) {
            let div = document.createElement('div');
            div.className = 'board-num';
            div.id = 'bn-' + i;
            div.innerText = i;
            board.appendChild(div);
        }

        // 2. ካርቴላ መምረጫ (1-100)
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 100; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => {
                if(selectedID) return; 
                selectedID = i;
                wallet -= 10; // 10 ብር ቀንሱ
                document.getElementById('wallet-amount').innerText = wallet.toFixed(2);
                btn.classList.add('selected-btn');
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            };
            grid.appendChild(btn);
        }

        // 3. ታይምር
        document.getElementById('player-count').innerText = players;
        const tInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(tInterval);
                startBingo();
            }
        }, 1000);

        function startBingo() {
            if(!selectedID) selectedID = Math.floor(Math.random() * 100) + 1;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-mode').classList.remove('hidden');
            
            // የደራሽ ሲስተም
            derash = players * 8; // በነፍስ ወከፍ 8 ብር (2 ብር ለቤቱ)
            document.getElementById('wallet-label').innerText = "ደራሽ";
            document.getElementById('wallet-amount').innerText = derash.toFixed(2) + " ETB";
            
            generateCard(selectedID);
            runCaller();
        }

        function runCaller() {
            const cInterval = setInterval(() => {
                if(calledNumbers.length >= 75) { clearInterval(cInterval); return; }
                let ball;
                do { ball = Math.floor(Math.random() * 75) + 1; } while(calledNumbers.includes(ball));
                
                calledNumbers.push(ball);
                document.getElementById('current-ball').innerText = ball;
                document.getElementById('bn-' + ball).classList.add('board-called');
                
                // ቁጥሩን መጥራት
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(ball));
            }, 4000);
        }

        function generateCard(id) {
            const seed = id * 99;
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let html = `<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            for(let i=0; i<5; i++) {
                html += '<tr>';
                for(let j=0; j<5; j++) {
                    let val = cols[j][i];
                    if(i==2 && j==2) html += `<td class="marked">FREE</td>`;
                    else html += `<td onclick="markCell(this, ${val})">${val}</td>`;
                }
                html += '</tr>';
            }
            document.getElementById('card-display').innerHTML = html + '</table>';
        }

        function getN(s, min, max) {
            let r = [];
            while(r.length < 5) {
                s = (s * 9301 + 49297) % 233280;
                let v = Math.floor((s/233280)*(max-min+1))+min;
                if(!r.includes(v)) r.push(v);
            }
            return r.sort((a,b)=>a-b);
        }

        function markCell(el, val) {
            if(!calledNumbers.includes(val)) return; // ያልወጣ ቁጥር አይነካም
            el.classList.add('marked');
            checkWinner();
        }

        function checkWinner() {
            const m = Array.from(document.querySelectorAll('#card-display td')).map(td => td.classList.contains('marked'));
            let w = false;
            for(let i=0; i<5; i++) {
                if(m[i*5]&&m[i*5+1]&&m[i*5+2]&&m[i*5+3]&&m[i*5+4]) w = true; // Row
                if(m[i]&&m[i+5]&&m[i+10]&&m[i+15]&&m[i+20]) w = true; // Col
            }
            if((m[0]&&m[6]&&m[12]&&m[18]&&m[24]) || (m[4]&&m[8]&&m[12]&&m[16]&&m[20])) w = true; // Diagonal
            if(m[0]&&m[4]&&m[20]&&m[24]) w = true; // 4 Corners

            if(w) {
                document.getElementById('winner-screen').style.display = 'flex';
                document.getElementById('win-amount').innerText = "+" + derash + " ETB";
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Bingo! You won " + derash + " birr"));
            }
        }
    </script>
</body>
</html>
