<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Hub - 50 Birr Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f021a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Header Info - ባላንስ 50 ብር ተደርጓል */
        .header-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .info-box { border: 1px solid #0088cc; border-radius: 8px; padding: 5px 12px; background: #1a1a1a; min-width: 80px; }
        .info-box div { font-size: 10px; color: #ccc; }
        .info-box span { color: #0088cc; font-weight: bold; font-size: 14px; }

        /* Timer - ገጹ እንደተከፈተ መቆጠር ይጀምራል */
        #timer-display { font-size: 60px; color: #f1c40f; font-weight: bold; height: 70px; margin: 10px 0; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }

        /* Selection Grid (1-100) */
        .selection-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; max-width: 450px; margin: 0 auto; background: #1a1a1a; padding: 15px; border-radius: 12px; }
        .num-btn { background: #e67e22; color: white; border: none; padding: 12px 0; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .selected-btn { background: #27ae60 !important; border: 2px solid white; }

        /* Bingo Card Area */
        .bingo-card { background: #27ae60; border: 4px solid #fff; border-radius: 12px; width: 320px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { border-collapse: collapse; width: 100%; }
        th { background: #1e8449; padding: 10px; font-size: 20px; border: 1px solid #fff; }
        td { border: 1px solid #fff; width: 55px; height: 55px; text-align: center; font-size: 22px; font-weight: bold; cursor: pointer; position: relative; }
        .marked { background: #f1c40f !important; color: black; }
        .marked::after { content: 'X'; color: red; position: absolute; font-size: 40px; left: 14px; top: 4px; opacity: 0.8; }
        .free-space { background: #f39c12; font-size: 10px; color: black; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="info-box"><div>Bet</div><span>10 ETB</span></div>
        <div class="info-box"><div>Wallet</div><span>50.00 ETB</span></div>
    </div>

    <div id="timer-display">30</div>

    <div id="selection-screen">
        <h3 style="color: #f1c40f; margin-bottom: 10px;">ካርቴላ ይምረጡ</h3>
        <div class="selection-grid" id="grid"></div>
    </div>

    <div id="game-screen" class="hidden">
        <h3 id="card-title" style="color: #f1c40f; margin: 10px 0;">ካርቴላ #</h3>
        <div id="card-box" class="bingo-card"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 25px; background:#e67e22; color:white; border:none; border-radius:8px; font-weight:bold;">ተመለስ</button>
    </div>

    <script>
        // 1. ታይምሩን ገጹ እንደተከፈተ ማስጀመር
        let timeLeft = 30;
        const timerDisplay = document.getElementById('timer-display');
        const timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.innerText = "ተጀመረ!";
            }
        }, 1000);

        // 2. ቁጥሮቹን 1-100 መፍጠር
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 100; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => selectCard(i, btn);
            grid.appendChild(btn);
        }

        function selectCard(id, btn) {
            // ሁሉንም ብርቱካንማ አድርገህ የተመረጠውን ብቻ አረንጓዴ ማድረግ
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected-btn'));
            btn.classList.add('selected-btn');

            // ካርቴላውን ከታች ማሳየት
            document.getElementById('card-title').innerText = "የተመረጠው ካርቴላ #" + id;
            document.getElementById('game-screen').classList.remove('hidden');
            generateBingo(id);
            
            // ወደ ካርቴላው ዝቅ እንዲል ማድረግ
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function generateBingo(id) {
            const seed = parseInt(id);
            const cols = [
                getN(seed, 1, 15), getN(seed + 5, 16, 30), 
                getN(seed + 10, 31, 45), getN(seed + 15, 46, 60), 
                getN(seed + 20, 61, 75)
            ];

            let html = `<table><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>`;
            for (let i = 0; i < 5; i++) {
                html += '<tr>';
                for (let j = 0; j < 5; j++) {
                    if (i === 2 && j === 2) html += `<td class="free-space marked">FREE</td>`;
                    else html += `<td onclick="this.classList.toggle('marked')">${cols[j][i]}</td>`;
                }
                html += '</tr>';
            }
            document.getElementById('card-box').innerHTML = html + '</table>';
        }

        function getN(s, min, max) {
            let r = [];
            while(r.length < 5) {
                s = (s * 9301 + 49297) % 233280;
                let v = Math.floor((s / 233280) * (max - min + 1)) + min;
                if(!r.includes(v)) r.push(v);
            }
            return r.sort((a, b) => a - b);
        }
    </script>
</body>
</html>
