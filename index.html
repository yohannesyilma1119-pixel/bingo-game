<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        .timer { font-size: 35px; color: #f1c40f; margin: 20px; font-weight: bold; }
        .selection-area { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .card-option { width: 130px; height: 170px; border-radius: 15px; cursor: pointer; border: 4px solid transparent; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; transition: 0.4s; }
        .green-card { background: linear-gradient(145deg, #2ecc71, #27ae60); }
        .orange-card { background: linear-gradient(145deg, #e67e22, #d35400); }
        .selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 25px white; }
        .grid { display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 20px auto; padding: 15px; border-radius: 12px; }
        .cell { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .marked { background: #f1c40f !important; color: #1a1a1a; transform: scale(0.9); box-shadow: 0 0 15px #f1c40f; }
        #status { font-size: 24px; margin-top: 20px; color: #2ecc71; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color: #f1c40f;">BINGO HUB</h1>
        <p>የሚጫወቱበትን ካርቴላ ይምረጡ</p>
        <div class="timer" id="countdown">30</div>
        <div class="selection-area">
            <div class="card-option green-card" onclick="selectCard('green', this)">GREEN</div>
            <div class="card-option orange-card" onclick="selectCard('orange', this)">ORANGE</div>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <h2 id="card-label">BINGO HUB</h2>
        <div id="board" class="grid"></div>
        <div id="status">ቁጥሮችን በመንካት ያሸንፉ!</div>
    </div>

    <script>
        let selectedCard = null;
        let timeLeft = 30;
        const boardElement = document.getElementById('board');

        function selectCard(color, el) {
            selectedCard = color;
            document.querySelectorAll('.card-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                startGame();
            }
        }, 1000);

        function startGame() {
            if (!selectedCard) selectedCard = 'green';
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            boardElement.style.display = 'grid';
            boardElement.style.backgroundColor = selectedCard === 'green' ? '#2ecc71' : '#e67e22';

            const nums = [];
            while(nums.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(nums.indexOf(r) === -1) nums.push(r);
            }

            nums.forEach((num) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.onclick = () => {
                    cell.classList.toggle('marked');
                    checkWinner();
                };
                boardElement.appendChild(cell);
            });
        }

        function checkWinner() {
            const cells = document.querySelectorAll('.cell');
            const m = Array.from(cells).map(c => c.classList.contains('marked'));
            let won = false;

            // አሸናፊነትን ቼክ ማድረጊያ ህጎች
            for (let i = 0; i < 5; i++) {
                if (m[i*5] && m[i*5+1] && m[i*5+2] && m[i*5+3] && m[i*5+4]) won = true; // Horizontal
                if (m[i] && m[i+5] && m[i+10] && m[i+15] && m[i+20]) won = true; // Vertical
            }
            if (m[0] && m[6] && m[12] && m[18] && m[24]) won = true; // Diagonal 1
            if (m[4] && m[8] && m[12] && m[16] && m[20]) won = true; // Diagonal 2
            if (m[0] && m[4] && m[20] && m[24]) won = true; // 4 Corners

            if (won) {
                document.getElementById('status').innerText = "🎉 YOU WIN! BINGO!";
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
