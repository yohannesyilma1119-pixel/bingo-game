<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Hub Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #8000ff; --secondary: #ff8000; --bg: #d1b3ff; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Layout Helpers */
        .screen { display: none; flex-direction: column; align-items: center; width: 100vw; height: 100vh; padding: 10px; box-sizing: border-box; }
        .active-screen { display: flex; }

        /* Stats Bar */
        .stats-bar { display: flex; width: 100%; max-width: 480px; gap: 5px; margin-bottom: 10px; }
        .stat-box { background: white; flex: 1; border-radius: 8px; padding: 5px; text-align: center; border: 1px solid #b380ff; }
        .stat-label { font-size: 9px; color: var(--primary); font-weight: bold; display: block; }
        .stat-val { font-size: 14px; font-weight: bold; }

        /* --- SCREEN 1: SELECTION --- */
        .scroll-grid { background: white; border-radius: 12px; width: 90%; height: 250px; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .sel-btn { background: var(--secondary); color: white; border: none; padding: 10px 0; border-radius: 5px; font-weight: bold; }
        .sel-btn.active { background: #27ae60; }
        
        /* --- SCREEN 2: GAME MODE --- */
        .game-container { display: flex; width: 100%; gap: 10px; }
        .bingo-board { background: #5a2d91; color: white; padding: 5px; border-radius: 8px; display: flex; flex-direction: column; width: 30%; }
        .board-col { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 5px; font-size: 10px; }
        .board-num { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .board-num.called { background: var(--secondary); font-weight: bold; }
        
        .current-call-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .call-circle { width: 80px; height: 80px; background: white; border-radius: 50%; border: 5px solid var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- WINNER POPUP (Screen 3 & 4) --- */
        #winner-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .winner-card-view { transform: scale(0.8); background: white; padding: 10px; border-radius: 10px; margin-top: 10px; }

        /* Bingo Card Styling */
        .bingo-card { background: white; border-radius: 8px; border: 2px solid white; color: #333; margin-top: 10px; }
        td { width: 35px; height: 35px; border: 1px solid #eee; text-align: center; font-weight: bold; }
        .marked { background: #27ae60 !important; color: white; }
    </style>
</head>
<body>

    <div id="selection-screen" class="screen active-screen">
        <div class="stats-bar">
            <div class="stat-box"><span class="stat-label">WALLET</span><div class="stat-val">100.00</div></div>
            <div class="stat-box"><span class="stat-label">TIMER</span><div class="stat-val" id="timer">25</div></div>
            <div class="stat-box"><span class="stat-label">STAKE</span><div class="stat-val">15.00</div></div>
            <div class="stat-box"><span class="stat-label">GAME#</span><div class="stat-val">882</div></div>
        </div>
        <div class="scroll-grid" id="grid"></div>
        <div id="preview-area" style="margin-top:15px;">
            <div id="card-preview" class="bingo-card"></div>
            <button id="play-btn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold; display:none;" onclick="startGame()">ጨዋታውን ጀምር</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-bar">
            <div class="stat-box"><span class="stat-label">DERASH</span><div class="stat-val">450.00</div></div>
            <div class="stat-box"><span class="stat-label">PLAYERS</span><div class="stat-val">32</div></div>
            <div class="stat-box"><span class="stat-label">BET</span><div class="stat-val">15</div></div>
            <div class="stat-box"><span class="stat-label">GAME#</span><div class="stat-val">882</div></div>
        </div>
        
        <div class="game-container">
            <div class="bingo-board" id="main-board">
                </div>
            <div class="current-call-area">
                <span style="font-weight:bold; color:var(--primary)">CURRENT CALL</span>
                <div class="call-circle" id="current-ball">-</div>
                <div id="my-player-card" class="winner-card-view" style="zoom:0.6;"></div>
            </div>
        </div>
    </div>

    <div id="winner-popup">
        <h1 style="color:var(--secondary); margin:0;">BINGO!</h1>
        <h2 id="winner-name">አሸናፊ፡ ተጫዋች 12</h2>
        <div id="winner-card-display" class="winner-card-view"></div>
        <p>ቀጣይ ጨዋታ በ 5 ሰከንድ ይጀምራል...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedID = null;
        let calledNumbers = [];
        
        // --- 1. ካርቴላዎችን መፍጠር ---
        const grid = document.getElementById('grid');
        for(let i=1; i<=200; i++) {
            let b = document.createElement('button');
            b.className = 'sel-btn';
            b.innerText = i;
            b.onclick = () => {
                selectedID = i;
                document.querySelectorAll('.sel-btn').forEach(btn => btn.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('card-preview').innerHTML = generateCardHTML(i);
                document.getElementById('play-btn').style.display = 'block';
                tg.HapticFeedback.impactOccurred('light');
            };
            grid.appendChild(b);
        }

        // --- 2. ወደ Game Mode መግባት ---
        function startGame() {
            document.getElementById('selection-screen').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            document.getElementById('my-player-card').innerHTML = generateCardHTML(selectedID);
            setupBoard();
            startDrawing();
        }

        // --- 3. ቦርዱን ማዘጋጀት (B I N G O) ---
        function setupBoard() {
            const board = document.getElementById('main-board');
            const letters = ['B', 'I', 'N', 'G', 'O'];
            letters.forEach((l, idx) => {
                let row = document.createElement('div');
                row.className = 'board-col';
                row.innerHTML = `<strong>${l}:</strong>`;
                for(let n = (idx*15)+1; n <= (idx*15)+15; n++) {
                    row.innerHTML += `<div class="board-num" id="bn-${n}">${n}</div>`;
                }
                board.appendChild(row);
            });
        }

        // --- 4. ቁጥሮችን በየተራ ማውጣት ---
        function startDrawing() {
            let interval = setInterval(() => {
                let ball = Math.floor(Math.random() * 75) + 1;
                if(!calledNumbers.includes(ball)) {
                    calledNumbers.push(ball);
                    document.getElementById('current-ball').innerText = ball;
                    let el = document.getElementById('bn-'+ball);
                    if(el) el.classList.add('called');
                    
                    // በዘፈቀደ አሸናፊ መጣ ለማለት (ለሙከራ)
                    if(calledNumbers.length === 20) {
                        clearInterval(interval);
                        showWinner("ተጫዋች #45", 45);
                    }
                }
            }, 3000);
        }

        // --- 5. አሸናፊ ማሳያ (Pic 3 & 4) ---
        function showWinner(name, cardId) {
            const popup = document.getElementById('winner-popup');
            document.getElementById('winner-name').innerText = "አሸናፊ፡ " + name;
            document.getElementById('winner-card-display').innerHTML = generateCardHTML(cardId);
            popup.style.display = 'flex';
            
            setTimeout(() => {
                popup.style.display = 'none';
                location.reload(); // ጨዋታውን እንደገና ለመጀመር
            }, 5000);
        }

        // ካርቴላ ሰሪ (Helper)
        function generateCardHTML(id) {
            const seed = id * 55;
            const getN = (s, min, max) => {
                let r = []; while(r.length<5) { s=(s*9301+49297)%233280; let v=Math.floor((s/233280)*(max-min+1))+min; if(!r.includes(v)) r.push(v); }
                return r.sort((a,b)=>a-b);
            };
            const cols = [getN(seed,1,15), getN(seed+1,16,30), getN(seed+2,31,45), getN(seed+3,46,60), getN(seed+4,61,75)];
            let h = `<table>`;
            for(let i=0; i<5; i++) {
                h += '<tr>';
                for(let j=0; j<5; j++) {
                    let v = cols[j][i];
                    let isFree = (i==2 && j==2);
                    h += `<td class="${isFree ? 'marked' : ''}">${isFree ? '★' : v}</td>`;
                }
                h += '</tr>';
            }
            return h + '</table>';
        }
    </script>
</body>
</html>
